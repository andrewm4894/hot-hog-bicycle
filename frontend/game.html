<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing - Hot Hog Intelligence</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/posthog-init.js"></script>
    <script src="/static/svg-code.js"></script>
</head>
<body>
    <div class="container stagger checker-band">
        <header>
            <h1><a href="/" class="home-link">Hot Hog<br>Intelligence<span class="title-accent">and how the sausage is made</span></a></h1>
        </header>

        <div class="model-selector">
            <label for="model-select">Your model</label>
            <select class="model-select" id="model-select">
                <option>loading...</option>
            </select>
        </div>

        <div class="round-indicator" id="round-dots"></div>

        <div class="card">
            <h3 id="round-title">Round 1 of 3</h3>
            <p id="round-description" style="color: var(--text-muted); margin: 0.5rem 0 0.75rem; font-size: 0.92rem;">
                Write a prompt to generate an SVG of a hot dog riding a bicycle.
            </p>
            <textarea id="prompt-input" placeholder="e.g. Draw a cute hot dog with mustard, sitting on a red bicycle, with spinning wheels..."></textarea>
            <div class="prompt-actions">
                <button class="btn btn-primary" id="submit-btn" onclick="submitPrompt()">
                    Generate SVG
                </button>
                <button class="btn btn-secondary" id="fresh-start-btn" style="display: none;" onclick="toggleFreshStart(this)">
                    Start Fresh
                </button>
                <button class="btn btn-secondary" id="final-answer-btn" style="display: none;" onclick="judgeGame()">
                    Final Answer
                </button>
                <input type="hidden" id="fresh-start" value="false">
                <span class="loading-text" id="loading" style="display: none;">
                    <span class="spinner"></span>
                    <span id="loading-label">Generating...</span>
                </span>
            </div>
        </div>

        <div id="round-results" style="margin: 1.5rem 0;">
            <div class="card" style="border-top: 3px solid var(--relish);">
                <h3 style="color: var(--relish); font-size: 0.9rem;">Your Result</h3>
                <div class="svg-preview svg-preview--hero" id="svg-preview">
                    <span class="placeholder">Your SVG will appear here</span>
                </div>
                <details class="convo-history" id="human-history">
                    <summary>Show prompt history</summary>
                    <div class="convo-history-list" id="human-history-list"></div>
                </details>
            </div>
            <div class="card" id="ai-result-card" style="display: none; border-top: 3px solid var(--ketchup); margin-top: 1.25rem;">
                <h3 style="color: var(--ketchup-bright); font-size: 0.9rem;">AI Challenger</h3>
                <div class="svg-preview" id="ai-svg-preview">
                    <span class="placeholder">Waiting...</span>
                </div>
                <details class="convo-history" id="ai-history">
                    <summary>Show prompt history</summary>
                    <div class="convo-history-list" id="ai-history-list"></div>
                </details>
            </div>
        </div>

        <nav>
            <a href="/">Home</a>
            <a href="/gallery">Gallery</a>
            <a href="/leaderboard">Matches</a>
            <a href="https://posthog.com/docs/llm-analytics" target="_blank" rel="noopener noreferrer" class="nav-docs-link">LLM Analytics Docs ↗</a>
        </nav>
    </div>

    <script>
        const gameId = window.location.pathname.split('/').pop();
        let gameState = null;
        let allModels = [];

        async function loadModels() {
            try {
                const res = await fetch('/api/models');
                if (res.ok) allModels = await res.json();
            } catch (e) { /* use whatever the game has */ }
        }

        function populateModelSelect() {
            const select = document.getElementById('model-select');
            if (!allModels.length) {
                select.innerHTML = `<option value="${gameState.generation_model}">${gameState.generation_model}</option>`;
                return;
            }
            select.innerHTML = allModels.map(m =>
                `<option value="${m}" ${m === gameState.generation_model ? 'selected' : ''}>${m}</option>`
            ).join('');
        }

        async function loadGame() {
            const res = await fetch(`/api/game/${gameId}`);
            if (!res.ok) {
                alert('Game not found');
                window.location.href = '/';
                return;
            }
            gameState = await res.json();
            if (!allModels.length) await loadModels();
            populateModelSelect();
            renderState();
            addCodeButtons();
        }

        function renderHistory(containerId, rounds) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (const r of rounds) {
                const entry = document.createElement('div');
                entry.className = 'convo-entry';
                entry.innerHTML = `
                    <div class="convo-round-label">Round ${r.round_number}</div>
                    <div class="convo-prompt">${r.prompt}</div>
                    ${r.svg ? `<div class="convo-thumb">${r.svg}</div>` : '<div class="convo-no-svg">No valid SVG</div>'}
                `;
                container.appendChild(entry);
            }
        }

        function renderState() {
            document.getElementById('model-select').value = gameState.generation_model;

            const loading = document.getElementById('loading');
            const btn = document.getElementById('submit-btn');
            if (loading) loading.style.display = 'none';
            if (btn) btn.disabled = false;
            const label = document.getElementById('loading-label');
            if (label) label.textContent = 'Generating...';

            const dots = document.getElementById('round-dots');
            dots.innerHTML = '';
            for (let i = 1; i <= gameState.rounds_total; i++) {
                const dot = document.createElement('div');
                dot.className = 'round-dot';
                if (i < gameState.current_round + 1) dot.classList.add('done');
                if (i === gameState.current_round + 1) dot.classList.add('active');
                dots.appendChild(dot);
            }

            const nextRound = gameState.current_round + 1;
            document.getElementById('round-title').textContent =
                `Round ${Math.min(nextRound, gameState.rounds_total)} of ${gameState.rounds_total}`;

            const humanHistory = document.getElementById('human-history');
            if (gameState.rounds && gameState.rounds.length > 0) {
                const latest = gameState.rounds[gameState.rounds.length - 1];
                if (latest.svg) {
                    document.getElementById('svg-preview').innerHTML = latest.svg;
                }
                humanHistory.querySelector('summary').textContent =
                    `Prompt history (${gameState.rounds.length} ${gameState.rounds.length === 1 ? 'round' : 'rounds'})`;
                renderHistory('human-history-list', gameState.rounds);
                humanHistory.style.display = '';
            } else {
                humanHistory.style.display = 'none';
            }

            // Show AI card and history if we have AI rounds
            const aiRounds = gameState.ai_rounds || [];
            const aiHistory = document.getElementById('ai-history');
            if (aiRounds.length > 0) {
                const aiCard = document.getElementById('ai-result-card');
                aiCard.style.display = 'block';
                const latestAi = aiRounds[aiRounds.length - 1];
                if (latestAi.svg) {
                    document.getElementById('ai-svg-preview').innerHTML = latestAi.svg;
                }
                aiHistory.querySelector('summary').textContent =
                    `Prompt history (${aiRounds.length} ${aiRounds.length === 1 ? 'round' : 'rounds'})`;
                renderHistory('ai-history-list', aiRounds);
            }

            if (gameState.status === 'complete') {
                window.location.href = `/results/${gameId}`;
            }

            // Show fresh-start and final-answer options after round 1
            const freshBtn = document.getElementById('fresh-start-btn');
            const finalBtn = document.getElementById('final-answer-btn');
            if (freshBtn) freshBtn.style.display = gameState.current_round > 0 && gameState.current_round < gameState.rounds_total ? 'inline-flex' : 'none';
            if (finalBtn) finalBtn.style.display = gameState.current_round > 0 && gameState.current_round < gameState.rounds_total ? 'inline-flex' : 'none';
            // Reset fresh start state on new render
            document.getElementById('fresh-start').value = 'false';
            if (freshBtn) { freshBtn.style.borderColor = ''; freshBtn.style.color = ''; }

            if (gameState.current_round >= gameState.rounds_total && gameState.status === 'playing') {
                document.getElementById('prompt-input').disabled = true;
                document.getElementById('submit-btn').textContent = 'Judge the Results';
                document.getElementById('submit-btn').onclick = judgeGame;
                if (finalBtn) finalBtn.style.display = 'none';
                document.getElementById('round-description').textContent =
                    'All rounds complete! Ready for the blind judge.';
            }
        }

        function toggleFreshStart(btn) {
            const input = document.getElementById('fresh-start');
            const active = input.value !== 'true';
            input.value = active ? 'true' : 'false';
            btn.style.borderColor = active ? 'var(--mustard)' : '';
            btn.style.color = active ? 'var(--mustard)' : '';
        }

        async function submitPrompt() {
            const prompt = document.getElementById('prompt-input').value.trim();
            if (!prompt) {
                document.getElementById('prompt-input').focus();
                return;
            }

            const btn = document.getElementById('submit-btn');
            const loading = document.getElementById('loading');
            btn.disabled = true;
            loading.style.display = 'flex';

            try {
                const res = await fetch(`/api/game/${gameId}/round`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt,
                        fresh_start: document.getElementById('fresh-start')?.value === 'true',
                        session_id: getPostHogSessionId(),
                        model: document.getElementById('model-select').value,
                    }),
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Round failed');
                }

                const result = await res.json();

                const preview = document.getElementById('svg-preview');
                if (result.human_svg) {
                    preview.innerHTML = result.human_svg;
                } else {
                    preview.innerHTML = '<span class="placeholder" style="color: var(--ketchup);">Model failed to produce valid SVG. Try again!</span>';
                }

                // Show AI challenger's result
                const aiCard = document.getElementById('ai-result-card');
                const aiPreview = document.getElementById('ai-svg-preview');
                aiCard.style.display = 'block';

                if (result.ai_svg) {
                    aiPreview.innerHTML = result.ai_svg;
                } else {
                    aiPreview.innerHTML = '<span class="placeholder" style="color: var(--ketchup);">AI also failed!</span>';
                }

                document.getElementById('prompt-input').value = '';
                await loadGame();

            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        async function judgeGame() {
            const btn = document.getElementById('submit-btn');
            const loading = document.getElementById('loading');
            btn.disabled = true;
            document.getElementById('loading-label').textContent = 'Judge is deliberating...';
            loading.style.display = 'flex';

            try {
                const res = await fetch(`/api/game/${gameId}/judge`, { method: 'POST' });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Judging failed');
                }
                window.location.href = `/results/${gameId}`;
            } catch (err) {
                alert('Error: ' + err.message);
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        document.getElementById('prompt-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const btn = document.getElementById('submit-btn');
                if (!btn.disabled) btn.click();
            }
        });

        loadGame();
    </script>
</body>
</html>
