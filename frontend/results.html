<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - Hot Hog Intelligence</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/posthog-init.js"></script>
    <script src="/static/svg-code.js"></script>
</head>
<body>
    <div class="container checker-band">
        <header>
            <h1><a href="/" class="home-link">Hot Hog<br>Intelligence<span class="title-accent">the sausage has been judged</span></a></h1>
        </header>

        <div class="checker-divider"></div>

        <div id="results-content">
            <div style="text-align: center; padding: 3rem;">
                <span class="loading-text" style="justify-content: center;">
                    <span class="spinner"></span>
                    Loading results...
                </span>
            </div>
        </div>

        <nav>
            <a href="/">Home</a>
            <a href="/gallery">Gallery</a>
            <a href="/leaderboard">Matches</a>
            <a href="https://posthog.com/docs/llm-analytics" target="_blank" rel="noopener noreferrer" class="nav-docs-link">LLM Analytics Docs ↗</a>
        </nav>
    </div>

    <script>
        const gameId = window.location.pathname.split('/').pop();

        async function loadResults() {
            const res = await fetch(`/api/game/${gameId}/results`);
            if (res.ok) {
                const data = await res.json();
                renderFullResults(data);
                return;
            }

            const judgeRes = await fetch(`/api/game/${gameId}/judge`, { method: 'POST' });
            if (judgeRes.ok) {
                const data = await judgeRes.json();
                renderFullResults(data);
            } else {
                document.getElementById('results-content').innerHTML =
                    '<p style="text-align:center; color: var(--ketchup);">Could not load results</p>';
            }
        }

        // Store current game data globally for appeal logic
        let currentGameData = null;
        let aiAppealPollTimer = null;

        function renderFullResults(data) {
            currentGameData = data;
            const container = document.getElementById('results-content');

            // Determine the effective winner (after appeal if overturned)
            const appeal = data.appeal;
            const effectiveWinner = (appeal && appeal.verdict === 'overturned') ? appeal.new_winner : data.winner;

            const winnerClass = effectiveWinner === 'human' ? 'human-wins' :
                               effectiveWinner === 'ai' ? 'ai-wins' : 'tie';
            const winnerText = effectiveWinner === 'human' ? 'YOU BEAT THE MACHINE!' :
                              effectiveWinner === 'ai' ? 'THE AI WINS THIS ROUND!' : "IT'S A TIE!";

            // Human can appeal when they lost; AI appeals automatically when it loses
            const canHumanAppeal = data.winner === 'ai' && !data.appeal;
            // Only show "deliberating" if game completed recently (within 2 min)
            const completedRecently = data.completed_at &&
                (Date.now() - new Date(data.completed_at).getTime()) < 120_000;
            const aiDeliberating = data.winner === 'human' && !data.appeal && completedRecently;

            container.innerHTML = `
                <div class="reveal-banner ${winnerClass}">${winnerText}</div>
                <p class="commentary">${data.commentary || ''}</p>

                <div class="models-info">
                    <span style="color: var(--text-muted); font-size: 0.85rem;">Both used</span>
                    <span class="model-badge">${data.generation_model}</span>
                    <span style="color: var(--text-dim); font-size: 0.8rem; font-family: var(--font-mono);">AI prompted by ${data.challenger_model.split('/').pop()}</span>
                    <span style="color: var(--text-dim); font-size: 0.8rem; font-family: var(--font-mono);">Judged by ${(data.judge_model || 'unknown').split('/').pop()}</span>
                </div>

                <div class="results-grid">
                    <div class="result-card ${effectiveWinner === 'human' ? 'winner' : ''}">
                        <h3>${effectiveWinner === 'human' ? 'Your Hot Dog (Winner!)' : 'Your Hot Dog'}</h3>
                        <div class="score-total">${data.human?.scores?.total || '?'}<span style="font-size:1rem;color:var(--text-dim)">/40</span></div>
                        <div class="svg-preview">${data.human?.svg || '<span class="placeholder">No SVG</span>'}</div>
                        ${renderScores(data.human?.scores)}
                        <div class="roast">${data.human?.scores?.roast || ''}</div>
                        ${renderRoundsHistory(data.human?.rounds, 'human')}
                    </div>

                    <div class="result-card ${effectiveWinner === 'ai' ? 'winner' : ''}">
                        <h3>${effectiveWinner === 'ai' ? 'AI Challenger (Winner!)' : 'AI Challenger'}</h3>
                        <div class="score-total">${data.ai?.scores?.total || '?'}<span style="font-size:1rem;color:var(--text-dim)">/40</span></div>
                        <div class="svg-preview">${data.ai?.svg || '<span class="placeholder">No SVG</span>'}</div>
                        ${renderScores(data.ai?.scores)}
                        <div class="roast">${data.ai?.scores?.roast || ''}</div>
                        ${renderRoundsHistory(data.ai?.rounds, 'ai')}
                    </div>
                </div>

                ${appeal ? renderAppealResults(appeal, data.winner) : ''}
                ${aiDeliberating ? renderAiDeliberating() : ''}
                ${canHumanAppeal ? renderAppealForm(data.winner) : ''}
            `;
            setTimeout(addCodeButtons, 0);

            // Poll for AI appeal decision when the human won
            if (aiDeliberating) {
                startAiAppealPolling();
            } else {
                stopAiAppealPolling();
            }
        }

        function renderAiDeliberating() {
            return `
                <div class="appeal-section">
                    <div class="appeal-deliberating">
                        <span class="spinner"></span>
                        <span>The AI challenger is considering whether to appeal...</span>
                    </div>
                </div>
            `;
        }

        let aiAppealPollCount = 0;
        const AI_APPEAL_MAX_POLLS = 30; // ~60 seconds at 2s intervals

        function startAiAppealPolling() {
            stopAiAppealPolling();
            aiAppealPollCount = 0;
            aiAppealPollTimer = setInterval(async () => {
                aiAppealPollCount++;
                if (aiAppealPollCount > AI_APPEAL_MAX_POLLS) {
                    stopAiAppealPolling();
                    // Replace deliberating message with acceptance
                    const el = document.querySelector('.appeal-deliberating');
                    if (el) {
                        el.innerHTML = '<span style="color: var(--text-muted);">The AI challenger accepted the ruling.</span>';
                    }
                    return;
                }
                try {
                    const res = await fetch(`/api/game/${gameId}/results`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.appeal) {
                            stopAiAppealPolling();
                            renderFullResults(data);
                        }
                    }
                } catch (e) { /* ignore poll errors */ }
            }, 2000);
        }

        function stopAiAppealPolling() {
            if (aiAppealPollTimer) {
                clearInterval(aiAppealPollTimer);
                aiAppealPollTimer = null;
            }
        }

        function renderAppealForm(originalWinner) {
            return `
                <div class="appeal-section">
                    <div class="appeal-prompt">
                        <h3>Disagree with the ruling?</h3>
                        <p>File an appeal to the Supreme Hot Dog Court! A different judge will review both SVGs, the original scores, and your plea.</p>
                    </div>
                    <div id="appeal-form" class="appeal-form">
                        <textarea id="appeal-text" class="appeal-textarea" rows="3"
                            placeholder="Plead your case... Why was the original ruling unfair?"
                            maxlength="500"></textarea>
                        <div class="appeal-form-footer">
                            <span class="appeal-char-count"><span id="appeal-char">0</span>/500</span>
                            <button onclick="submitAppeal()" class="btn appeal-btn">
                                File Appeal
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAppealResults(appeal, originalWinner) {
            const overturned = appeal.verdict === 'overturned';
            const verdictClass = overturned ? 'appeal-overturned' : 'appeal-upheld';
            const verdictText = overturned ? 'OVERTURNED!' : 'UPHELD';
            const verdictIcon = overturned ? '&#x1F389;' : '&#x2696;';
            const appellantLabel = appeal.appellant === 'ai' ? 'AI Challenger' : 'You';

            return `
                <div class="appeal-section">
                    <div class="appeal-court-header">
                        <span class="appeal-court-icon">&#x2696;</span>
                        <span class="appeal-court-title">Supreme Hot Dog Court</span>
                    </div>
                    <div class="appeal-filed-by">
                        Appeal filed by: <strong>${appellantLabel}</strong>
                    </div>
                    <div class="appeal-result ${verdictClass}">
                        <div class="appeal-verdict-banner">
                            <span class="appeal-gavel">${verdictIcon}</span>
                            <span class="appeal-verdict-text">APPEAL ${verdictText}</span>
                        </div>

                        <div class="appeal-meta">
                            Reviewed by <span class="model-badge" style="font-size: 0.75rem;">${(appeal.appeal_judge_model || 'unknown').split('/').pop()}</span>
                        </div>

                        ${appeal.appeal_text ? `
                            <div class="appeal-plea">
                                <div class="appeal-plea-label">${appellantLabel}'s plea:</div>
                                <div class="appeal-plea-text">"${escapeHtml(appeal.appeal_text)}"</div>
                            </div>
                        ` : ''}

                        <div class="appeal-reasoning">${escapeHtml(appeal.reasoning || '')}</div>

                        ${appeal.response_to_appellant ? `
                            <div class="appeal-response">
                                <div class="appeal-response-label">To the appellant:</div>
                                ${escapeHtml(appeal.response_to_appellant)}
                            </div>
                        ` : ''}

                        ${overturned ? `
                            <div class="appeal-new-scores">
                                <h4>Revised Scores</h4>
                                <div class="appeal-scores-grid">
                                    <div>
                                        <strong>Your Hot Dog</strong>
                                        <div class="score-total">${appeal.human_scores?.total || '?'}<span style="font-size:0.8rem;color:var(--text-dim)">/40</span></div>
                                        ${renderScores(appeal.human_scores)}
                                    </div>
                                    <div>
                                        <strong>AI Challenger</strong>
                                        <div class="score-total">${appeal.ai_scores?.total || '?'}<span style="font-size:0.8rem;color:var(--text-dim)">/40</span></div>
                                        ${renderScores(appeal.ai_scores)}
                                    </div>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        async function submitAppeal() {
            const textarea = document.getElementById('appeal-text');
            const appealText = textarea.value.trim();
            if (!appealText) {
                textarea.focus();
                return;
            }

            const btn = document.querySelector('.appeal-btn');
            const form = document.getElementById('appeal-form');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> The Supreme Court is deliberating...';
            textarea.disabled = true;

            try {
                const res = await fetch(`/api/game/${gameId}/appeal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        appeal_text: appealText,
                        session_id: window.posthog?.get_session_id?.() || null,
                    }),
                });

                if (res.ok) {
                    // Reload the full results page to show appeal outcome
                    const data = await fetch(`/api/game/${gameId}/results`);
                    if (data.ok) {
                        renderFullResults(await data.json());
                    }
                } else {
                    const err = await res.json();
                    btn.disabled = false;
                    btn.textContent = 'File Appeal';
                    textarea.disabled = false;
                    alert(err.detail || 'Appeal failed');
                }
            } catch (e) {
                btn.disabled = false;
                btn.textContent = 'File Appeal';
                textarea.disabled = false;
                alert('Network error — try again');
            }
        }

        // Character counter for appeal textarea
        document.addEventListener('input', function(e) {
            if (e.target.id === 'appeal-text') {
                const counter = document.getElementById('appeal-char');
                if (counter) counter.textContent = e.target.value.length;
            }
        });

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderRoundsHistory(rounds, side) {
            if (!rounds || rounds.length === 0) return '';
            const label = side === 'ai' ? 'AI prompts' : 'Your prompts';
            const wrapperId = side === 'ai' ? 'ai-history' : 'human-history';
            const entries = rounds.map(r => `
                <div class="convo-entry">
                    <div class="convo-round-label">Round ${r.round_number}</div>
                    <div class="convo-prompt">${escapeHtml(r.prompt)}</div>
                    ${r.svg ? `<div class="convo-thumb">${r.svg}</div>` : '<div class="convo-no-svg">No valid SVG</div>'}
                </div>
            `).join('');
            return `
                <details class="convo-history" id="${wrapperId}">
                    <summary>${label} (${rounds.length} ${rounds.length === 1 ? 'round' : 'rounds'})</summary>
                    <div class="convo-history-list">${entries}</div>
                </details>
            `;
        }

        function renderScores(scores) {
            if (!scores) return '';
            return `
                <div style="margin-top: 0.75rem;">
                    <div class="score-bar"><span class="label">Accuracy</span><span>${scores.accuracy || '?'}/10</span></div>
                    <div class="score-bar"><span class="label">Creativity</span><span>${scores.creativity || '?'}/10</span></div>
                    <div class="score-bar"><span class="label">Quality</span><span>${scores.quality || '?'}/10</span></div>
                    <div class="score-bar"><span class="label">Humor</span><span>${scores.humor || '?'}/10</span></div>
                </div>
            `;
        }

        loadResults();
    </script>
</body>
</html>
